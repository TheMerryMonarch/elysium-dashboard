        <div><b>UNS 10&nbsp;lb CO₂</b><span>Inline atomizer</span></div>
      </div>
    </div>

</main>

<script>
/* =======================
   CONFIG
======================= */
const API_BASE = "https://elysium-cloud.onrender.com";
const ENDPOINTS = {
  latest: `${API_BASE}/latest`,
  history: `${API_BASE}/history`,
  health: `${API_BASE}/health`
};

/* =======================
   TIME HELPERS (CST)
======================= */
function formatCST(iso) {
  return new Date(iso).toLocaleString("en-US", {
    timeZone: "America/Chicago",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    month: "numeric",
    day: "numeric"
  });
}

function secondsAgo(iso) {
  const t = new Date(iso).getTime();
  if (!Number.isFinite(t)) return null;
  return Math.floor((Date.now() - t) / 1000);
}

// Stable hour key in CST: "YYYY-MM-DD HH"
function hourKeyCST(iso) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Chicago",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    hour12: false
  }).formatToParts(new Date(iso));
  const get = (t) => parts.find(p => p.type === t)?.value;
  return `${get("year")}-${get("month")}-${get("day")} ${get("hour")}`;
}

// Build the last 24 hour keys + labels (in CST), ending at the current hour
function last24HoursCST() {
  const keys = [];
  const labels = [];

  // Use local "now" but format keys/labels in CST
  const now = new Date();
  // Build 24 points back from now (hourly)
  for (let i = 23; i >= 0; i--) {
    const d = new Date(now.getTime() - i * 60 * 60 * 1000);

    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "America/Chicago",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      hour12: false
    }).formatToParts(d);

    const get = (t) => parts.find(p => p.type === t)?.value;
    const key = `${get("year")}-${get("month")}-${get("day")} ${get("hour")}`;
    keys.push(key);
    labels.push(`${get("hour")}:00`);
  }

  return { keys, labels };
}

/* =======================
   LANGUAGE TOGGLE
======================= */
let currentLang = "en";

const translations = {
  en: {
    title: "Project Elysium",
    stream: "Live Window",
    temp: "Temperature",
    ph: "pH",
    biota: "Interesting Flora & Fauna",
    specs: "Specs",
    tempUnit: "°F",
    phUnit: "",
    button: "日本語"
  },
  jp: {
    title: "プロジェクト・エリジウム",
    stream: "ライブ映像",
    temp: "水温",
    ph: "pH",
    biota: "興味深い動植物",
    specs: "機材",
    tempUnit: "°F",
    phUnit: "",
    button: "English"
  }
};

function applyLanguage() {
  const t = translations[currentLang];
  document.getElementById("title").textContent = t.title;

  const sl = document.querySelector(".stream-label");
  if (sl) sl.textContent = t.stream;

  const bt = document.getElementById("biota-title");
  if (bt) bt.textContent = t.biota;

  const st = document.getElementById("specs-title");
  if (st) st.textContent = t.specs;

  document.getElementById("temp-label").textContent = t.temp;
  document.getElementById("temp-unit").textContent = t.tempUnit;

  document.getElementById("ph-label").textContent = t.ph;
  document.getElementById("ph-unit").textContent = t.phUnit;

  document.querySelector(".lang-toggle").textContent = t.button;
}

function toggleLanguage() {
  currentLang = currentLang === "en" ? "jp" : "en";
  applyLanguage();
}

/* =======================
   SAFE FETCH (LATEST)
======================= */
async function fetchLatest() {
  try {
    const r = await fetch(ENDPOINTS.latest, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error("fetchLatest failed:", e);
    return {};
  }
}

async function updateDashboard() {
  const data = await fetchLatest();

  // Temperature (support both keys)
  const temp = data.temperature_f ?? data.temp_f;
  const tempEl = document.getElementById("temp-value");
  if (tempEl) tempEl.textContent = (temp != null && temp !== "") ? Number(temp).toFixed(2) : "--";

  // pH
  const phVal = data.ph ?? data.pH ?? data.ph_value;
  const phEl = document.getElementById("ph-value");
  if (phEl) {
    phEl.textContent = (phVal != null && phVal !== "") ? Number(phVal).toFixed(2) : "--";
  }
  // Last updated lines (one timestamp powers all three)
  if (data.timestamp) {
    const s = secondsAgo(data.timestamp);
    const line = (s == null)
      ? `Last updated — (${formatCST(data.timestamp)})`
      : `Last updated ${s}s ago (${formatCST(data.timestamp)})`;

    const tlu = document.getElementById("temp-last-updated");
    const plu = document.getElementById("ph-last-updated");
    if (tlu) tlu.textContent = line;
    if (plu) plu.textContent = line;
  }

  // Debug (optional)
  // console.log("LATEST:", data);
}

/* =======================
   HISTORY (24h hourly avg)
======================= */
async function fetchHistory() {
  try {
    const r = await fetch(`${ENDPOINTS.history}?hours=24&limit=20000`, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error("fetchHistory failed:", e);
    return [];
  }
}

function avgBucketsFromHistory(history, valueGetter) {
  const now = Date.now();
  const cutoff = now - 24 * 60 * 60 * 1000;
  const buckets = new Map(); // key -> {sum,count}

  for (const r of history) {
    const ts = new Date(r.timestamp).getTime();
    if (!Number.isFinite(ts) || ts < cutoff || ts > now) continue;

    const v = valueGetter(r);
    const n = Number(v);
    if (!Number.isFinite(n)) continue;

    const key = hourKeyCST(r.timestamp);
    const cur = buckets.get(key) || { sum: 0, count: 0 };
    cur.sum += n;
    cur.count += 1;
    buckets.set(key, cur);
  }
  return buckets;
}

function seriesFromBuckets(hourKeys, buckets) {
  return hourKeys.map(k => {
    const b = buckets.get(k);
    if (!b || !b.count) return null;
    return b.sum / b.count;
  });
}

/* =======================
   CHARTS
======================= */
let tempChart, phChart;

function makeLineChart(ctx, labels, data, borderColor, backgroundColor) {
  return new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data,
        borderColor,
        backgroundColor,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        spanGaps: false,
        borderDash: [2, 3]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, autoSkip: true } }
      }
    }
  });
}

async function updateCharts() {
  const history = await fetchHistory();
  if (!Array.isArray(history) || history.length === 0) {
    console.warn("No history returned; charts will be empty.");
    return;
  }

  const { keys: hourKeys, labels } = last24HoursCST();

  // Pick fields robustly (support old/new shapes)
  const tempBuckets = avgBucketsFromHistory(history, r =>
    r.temperature_f ?? r.temp_f ?? r.value
  );

  const phBuckets = avgBucketsFromHistory(history, r =>
    r.ph ?? r.pH ?? r.ph_value
  );

  const tempData = seriesFromBuckets(hourKeys, tempBuckets);
  const phData   = seriesFromBuckets(hourKeys, phBuckets);

  const tempCtx = document.getElementById("temp-chart")?.getContext("2d");
  const phCtx   = document.getElementById("ph-chart")?.getContext("2d");

  if (tempCtx) {
    if (!tempChart) tempChart = makeLineChart(tempCtx, labels, tempData, "rgba(255, 106, 193, 0.95)", "rgba(255, 106, 193, 0.18)");
    else { tempChart.data.labels = labels; tempChart.data.datasets[0].data = tempData; tempChart.update(); }
  }

  if (phCtx) {
    if (!phChart) phChart = makeLineChart(phCtx, labels, phData, "rgba(77, 238, 234, 0.95)", "rgba(77, 238, 234, 0.16)");
    else { phChart.data.labels = labels; phChart.data.datasets[0].data = phData; phChart.update(); }
  }

  // Debug: prove we have non-null points
  // console.log("Chart points:", {
  //   tempNonNull: tempData.filter(x => x != null).length,
  //   doNonNull: doData.filter(x => x != null).length,
  //   tdsNonNull: tdsData.filter(x => x != null).length
  // });
}

/* =======================
   FLORA & FAUNA
   Edit this list to manage what's shown.
   - wiki:  the Wikipedia page title from its URL
            (en.wikipedia.org/wiki/Neocaridina_davidi  ->  "Neocaridina_davidi").
            The photo + blurb are pulled from Wikipedia automatically.
   - count: manual; set to null to hide the count (e.g. for plants).
======================= */
const BIOTA = [
  {
    name: "Amano Shrimp", nickname: "melvin", wiki: "Caridina multidentata",
    type: "Shrimp", count: 1,
    blurb: "A hardy algae-eating shrimp prized in planted tanks for its appetite and peaceful temperament. Larger than Neocaridina, and can't breed in freshwater, so the population stays put."
  },
  {
    name: "Monte Carlo", wiki: "Micranthemum tweediei",
    type: "Plant", count: null,
    blurb: "A low-growing carpeting plant with small round leaves, used for lush foreground 'lawns'. Spreads horizontally under strong light and CO₂."
  },
  {
    name: "Eleocharis vivipara", wiki: "Eleocharis vivipara",
    type: "Plant", count: null,
    blurb: "A tall, grass-like aquatic sedge that forms flowing background stands. Propagates by sprouting plantlets at its blade tips — hence 'vivipara'."
  },
];

async function wikiSummary(title) {
  try {
    const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*"
      + "&prop=pageimages|extracts&piprop=thumbnail&pithumbsize=500&exintro=1&explaintext=1&redirects=1"
      + "&titles=" + encodeURIComponent(title);
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    const page = Object.values(j.query?.pages || {})[0] || {};
    const text = page.extract ? page.extract.split(". ").slice(0, 2).join(". ").replace(/\.?$/, ".") : "";
    return { img: page.thumbnail?.source || "", text };
  } catch (e) {
    console.error("wiki fetch failed for", title, e);
    return { img: "", text: "" };
  }
}

async function renderBiota() {
  const grid = document.getElementById("biota-grid");
  if (!grid) return;
  grid.innerHTML = "";
  for (const item of BIOTA) {
    const card = document.createElement("div");
    card.className = "biota-card";
    card.innerHTML = `
      <div class="biota-photo"></div>
      <div class="biota-body">
        <div class="biota-head">
          <span class="biota-name"></span>
          <span class="biota-type"></span>
        </div>
        <p class="biota-blurb">Loading…</p>
      </div>`;
    // build the title: name + count + nickname (text only, no HTML injection)
    const countStr = (item.count != null) ? ` x${item.count}` : "";
    const nickStr = item.nickname ? ` (answers to "${item.nickname}")` : "";
    card.querySelector(".biota-name").textContent = item.name + countStr + nickStr;
    card.querySelector(".biota-type").textContent = item.type;
    grid.appendChild(card);

    const photo = card.querySelector(".biota-photo");
    const blurb = card.querySelector(".biota-blurb");

    // Manual overrides win; otherwise pull photo + blurb from Wikipedia.
    // Add img:"<url>" and/or blurb:"<text>" to a BIOTA entry to override.
    if (item.img) photo.style.backgroundImage = `url("${item.img}")`;
    if (item.img && item.blurb) { blurb.textContent = item.blurb; continue; }

    wikiSummary(item.wiki).then(({ img, text }) => {
      if (!item.img && img) photo.style.backgroundImage = `url("${img}")`;
      blurb.textContent = item.blurb || text || "No description available.";
    });
  }
}

/* =======================
   LIGHT CYCLE (Central Time)
======================= */
function centralNowMinutes() {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Chicago", hour: "2-digit", minute: "2-digit", hour12: false
  }).formatToParts(new Date());
  const get = (t) => parseInt(parts.find(p => p.type === t).value, 10);
  let h = get("hour"); if (h === 24) h = 0;
  return h * 60 + get("minute");
}

const NOTICES = { 720: "The shadows retreat", 780: "The sun rises in Elysium", 1200: "The day grows long", 1260: "Night falls in Elysium..." };

function updateLightCycle() {
  const k = document.getElementById("kanji");
  if (!k) return;
  const t = centralNowMinutes();
  const ON = 13 * 60, OFF = 21 * 60;                   // lights 1:00pm – 9:00pm CT
  const MORNING = ON - 60, TWILIGHT = OFF - 60;
  const CO2_ON = 12 * 60 + 30, CO2_OFF = 20 * 60 + 30; // CO2 12:30pm – 8:30pm CT

  let kanji, color;
  if (t >= MORNING && t < ON)        { kanji = "朝";   color = "#b8a9ff"; }
  else if (t >= ON && t < TWILIGHT)  { kanji = "日";   color = "#ffd86b"; }
  else if (t >= TWILIGHT && t < OFF) { kanji = "黄昏"; color = "#ff6ac1"; }
  else                               { kanji = "夜";   color = "#4deeea"; }

  k.textContent = kanji;
  k.style.color = color;
  k.style.textShadow = `0 0 16px ${color}`;

  // CO2 line only appears while CO2 is actually flowing
  document.getElementById("co2").style.display = (t >= CO2_ON && t < CO2_OFF) ? "" : "none";

  // transition notice flashes for its one minute, in the new phase's color
  const notice = document.getElementById("notice");
  const msg = NOTICES[t];
  if (msg) {
    notice.textContent = msg;
    notice.style.color = color;
    notice.style.textShadow = `0 0 11px ${color}`;
    notice.style.display = "";
  } else {
    notice.style.display = "none";
  }
}

/* =======================
   BOOTSTRAP
======================= */
window.addEventListener("DOMContentLoaded", () => {
  applyLanguage();

  updateDashboard();
  updateCharts();
  renderBiota();
  updateLightCycle();

  setInterval(updateDashboard, 5000);    // live values
  setInterval(updateCharts, 60000);      // charts refresh every 60s
  setInterval(updateLightCycle, 30000);  // light/CO2 phase every 30s
});
</script>

<!-- =======================
     LIVE TANK STREAM
======================= -->
<script>
(function () {
  const SRC = "https://live.elysiumshrimptank.com/hls/elysium.m3u8";
  const video = document.getElementById("elysium-stream");
  const badge = document.querySelector(".live-badge");
  if (!video) return;

  function setLive(on) {
    if (!badge) return;
    badge.classList.toggle("offline", !on);
    const txt = badge.querySelector(".live-text");
    if (txt) txt.textContent = on ? "LIVE" : "OFFLINE";
  }

  function start() {
    if (video.canPlayType("application/vnd.apple.mpegurl")) {
      // Safari / iOS — native HLS
      video.src = SRC;
      video.addEventListener("playing", () => setLive(true));
      video.addEventListener("error", () => { setLive(false); setTimeout(start, 10000); });
    } else if (window.Hls && Hls.isSupported()) {
      const hls = new Hls({ liveSyncDuration: 4, lowLatencyMode: true });
      hls.loadSource(SRC);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => setLive(true));
      hls.on(Hls.Events.ERROR, (_e, d) => {
        if (d.fatal) { setLive(false); setTimeout(() => { hls.destroy(); start(); }, 10000); }
      });
    }
  }
  start();
})();
</script>

</body>
</html>
